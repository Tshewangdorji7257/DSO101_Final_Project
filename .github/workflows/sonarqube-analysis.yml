name: SonarQube Code Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarqube-backend:
    name: SonarQube Backend Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install SonarQube Scanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          export PATH=$PWD/sonar-scanner-5.0.1.3006-linux/bin:$PATH

      - name: Run Backend SonarQube Analysis
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          export PATH=$PWD/sonar-scanner-5.0.1.3006-linux/bin:$PATH
          cd blog-backend
          sonar-scanner \
            -Dsonar.projectKey=blog-backend \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.sources=src \
            -Dsonar.tests=test \
            -Dsonar.exclusions=node_modules/**,dist/**,build/**,.git/**,test/** \
            -Dsonar.test.inclusions=test/**/*.test.js \
            -Dsonar.coverage.exclusions=test/**,node_modules/** \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN

  sonarqube-frontend:
    name: SonarQube Frontend Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install SonarQube Scanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          export PATH=$PWD/sonar-scanner-5.0.1.3006-linux/bin:$PATH

      - name: Run Frontend SonarQube Analysis
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          export PATH=$PWD/sonar-scanner-5.0.1.3006-linux/bin:$PATH
          cd blog-frontend
          sonar-scanner \
            -Dsonar.projectKey=blog-frontend \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.sources=app,components,lib,hooks,styles \
            -Dsonar.tests=__tests__ \
            -Dsonar.exclusions=node_modules/**,.next/**,dist/**,build/**,.git/**,coverage/**,__tests__/** \
            -Dsonar.test.inclusions=__tests__/**/*.{test,spec}.{js,jsx,ts,tsx} \
            -Dsonar.coverage.exclusions=__tests__/**,node_modules/**,.next/** \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN
