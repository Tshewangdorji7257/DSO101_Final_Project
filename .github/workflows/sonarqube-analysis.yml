name: SonarQube Code Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarqube-backend:
    name: SonarQube Backend Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Backend SonarQube Analysis (Docker)
        uses: SonarSource/sonarcloud-github-action@v2.1.1
        with:
          projectBaseDir: ./blog-backend
          args: |
            -Dsonar.projectKey=blog-backend
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=test
            -Dsonar.exclusions=node_modules/**,dist/**,build/**,.git/**,test/**
            -Dsonar.test.inclusions=test/**/*.test.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonarqube-frontend:
    name: SonarQube Frontend Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Frontend SonarQube Analysis (Docker)
        uses: SonarSource/sonarcloud-github-action@v2.1.1
        with:
          projectBaseDir: ./blog-frontend
          args: |
            -Dsonar.projectKey=blog-frontend
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=app,components,lib,hooks,styles
            -Dsonar.tests=__tests__
            -Dsonar.exclusions=node_modules/**,.next/**,dist/**,build/**,.git/**,coverage/**,__tests__/**
            -Dsonar.test.inclusions=__tests__/**/*.test.tsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
