name: Blog CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/blog-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/blog-frontend

jobs:

# -----------------------------
# Backend Test + Lint
# -----------------------------
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: blog-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blog-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint || true

      - name: Run tests
        run: npm test


# -----------------------------
# Frontend Test + Build
# -----------------------------
  frontend-test-build:
    name: Frontend Test and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: blog-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint || true

      - name: Run frontend tests
        run: pnpm test || true

      - name: Build frontend
        run: pnpm build


# -----------------------------
# Docker Build + Push
# -----------------------------
  docker-build:
    name: Build and Push Docker Images
    needs:
      - backend-test
      - frontend-test-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./blog-backend
          file: ./blog-backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./blog-frontend
          file: ./blog-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}


# -----------------------------
# Deploy to Render
# -----------------------------
  deploy:
    name: Deploy Services
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Backend
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL_BACKEND }}"

      - name: Deploy Frontend
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL_FRONTEND }}"

          curl -fsS -X POST "$RENDER_FRONTEND_DEPLOY_HOOK_URL"