name: Blog CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/blog-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/blog-frontend

jobs:

# -----------------------------
# Backend Test + Build
# -----------------------------
  backend-test-build:
    name: Backend Test and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: blog-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blog-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint || true

      - name: Run tests
        run: npm test


# -----------------------------
# Frontend Test + Build
# -----------------------------
  frontend-test-build:
    name: Frontend Test and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: blog-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint || true

      - name: Run frontend tests
        run: pnpm test || true

      - name: Build frontend
        run: pnpm build


# -----------------------------
# SonarQube Code Quality Analysis
# -----------------------------
  sonarqube-analysis:
    name: SonarQube Code Quality Analysis
    needs:
      - backend-test-build
      - frontend-test-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install backend dependencies
        working-directory: blog-backend
        run: npm ci

      - name: Generate backend coverage
        working-directory: blog-backend
        run: npm run test:coverage || true

      - name: Install frontend dependencies
        working-directory: blog-frontend
        run: pnpm install --frozen-lockfile

      - name: Generate frontend coverage
        working-directory: blog-frontend
        run: pnpm test || true

      - name: SonarQube Scan - Full Project
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io


# -----------------------------
# Docker Build + Push
# -----------------------------
  docker-build:
    name: Build and Push Docker Images
    needs:
      - backend-test-build
      - frontend-test-build
      - sonarqube-analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./blog-backend
          file: ./blog-backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./blog-frontend
          file: ./blog-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}


# -----------------------------
# OWASP ZAP Dynamic Security Scan (Post-Deployment)
# -----------------------------
  owasp-zap-scan:
    name: OWASP ZAP Security Scan
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for production services
        run: |
          echo "Waiting for production services to be ready..."
          BACKEND_URL="${{ secrets.PRODUCTION_BACKEND_URL }}"
          FRONTEND_URL="${{ secrets.PRODUCTION_FRONTEND_URL }}"

          # Wait for backend
          echo "Checking backend at: $BACKEND_URL"
          for i in {1..60}; do
            if curl -f -s "$BACKEND_URL/health" > /dev/null 2>&1; then
              echo "✓ Backend is ready"
              break
            fi
            echo "Attempt $i: Backend not ready, waiting..."
            sleep 2
          done

          # Wait for frontend
          echo "Checking frontend at: $FRONTEND_URL"
          for i in {1..60}; do
            if curl -f -s "$FRONTEND_URL" > /dev/null 2>&1; then
              echo "✓ Frontend is ready"
              break
            fi
            echo "Attempt $i: Frontend not ready, waiting..."
            sleep 2
          done

      - name: Run OWASP ZAP API Scan - Backend
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: ${{ secrets.PRODUCTION_BACKEND_URL }}
          rules_file_name: '.zap/api-rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

      - name: Run OWASP ZAP Full Scan - Frontend
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          rules_file_name: '.zap/web-rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-reports
          path: |
            report_md.md
            report_html.html
          retention-days: 30

      - name: Comment ZAP Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'report_md.md';
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🔒 OWASP ZAP Security Scan Results\n\n${report}`
              });
            }
        continue-on-error: true


# -----------------------------
# Deploy to Render
# -----------------------------
  deploy:
    name: Deploy Services
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy Backend
        env:
          BACKEND_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL_BACKEND }}
        run: |
          if [ -z "$BACKEND_HOOK" ]; then
            echo "ERROR: RENDER_DEPLOY_HOOK_URL_BACKEND is not set"
            exit 1
          fi
          echo "Triggering backend deployment..."
          curl -f -X POST "$BACKEND_HOOK"
          echo "Backend deployment triggered successfully"

      - name: Deploy Frontend
        env:
          FRONTEND_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL_FRONTEND }}
        run: |
          if [ -z "$FRONTEND_HOOK" ]; then
            echo "ERROR: RENDER_DEPLOY_HOOK_URL_FRONTEND is not set"
            exit 1
          fi
          echo "Triggering frontend deployment..."
          curl -f -X POST "$FRONTEND_HOOK"
          echo "Frontend deployment triggered successfully"

      - name: Wait for services to stabilize
        run: |
          echo "Waiting for deployed services to stabilize..."
          sleep 30
          echo "Services should be ready for security scanning"