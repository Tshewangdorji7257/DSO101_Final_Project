sonar.projectKey=blog-backend
sonar.projectName=Blog Backend
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Source files
sonar.sources=src
sonar.tests=test

# Exclude node_modules and other non-source files
sonar.exclusions=node_modules/**,dist/**,build/**,.git/**

# Test files
sonar.test.inclusions=test/**/*.test.js

# Code coverage (if using coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js
