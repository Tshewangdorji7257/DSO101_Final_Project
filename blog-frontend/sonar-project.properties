sonar.projectKey=blog-frontend
sonar.projectName=Blog Frontend
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# Source files
sonar.sources=app,components,lib,hooks,styles
sonar.tests=__tests__

# Exclude node_modules and other non-source files
sonar.exclusions=node_modules/**,.next/**,dist/**,build/**,.git/**,coverage/**

# Test files
sonar.test.inclusions=__tests__/**/*.{test,spec}.{js,jsx,ts,tsx}

# Code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts
