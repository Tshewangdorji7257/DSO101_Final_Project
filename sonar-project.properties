sonar.projectKey=DSO_FINAL_Project
sonar.projectName=DSO Final Project
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8
sonar.organization=YOUR_ORG_KEY_HERE

# Source files - analyze both frontend and backend
sonar.sources=blog-backend/src,blog-frontend/app,blog-frontend/components,blog-frontend/lib,blog-frontend/hooks,blog-frontend/styles
sonar.tests=blog-backend/test,blog-frontend/__tests__

# Exclude node_modules and other non-source files
sonar.exclusions=node_modules/**,.next/**,dist/**,build/**,.git/**,coverage/**,blog-backend/test/**,blog-frontend/__tests__/**

# Test files
sonar.test.inclusions=blog-backend/test/**/*.test.js,blog-frontend/__tests__/**/*.{test,spec}.{js,jsx,ts,tsx}
sonar.coverage.exclusions=blog-backend/test/**,blog-frontend/__tests__/**,node_modules/**,.next/**

# Coverage reports
sonar.javascript.lcov.reportPaths=blog-backend/coverage/lcov.info,blog-frontend/coverage/lcov.info

# JavaScript/TypeScript specific settings
sonar.javascript.node.maxOldSpaceSize=4096
